<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>조별과제 MBTI 테스트</title>

  <!-- 폰트 -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSans.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: "Pretendard", sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    /* 📸 블러 교실 배경 */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1588072432836-e10032774350') center/cover no-repeat;
      filter: blur(8px) brightness(0.7);
      z-index: -1;
    }

    .container {
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    h1 {
      font-family: "GmarketSans", sans-serif;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .question {
      margin: 20px 0;
      font-size: 18px;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: rgba(255,255,255,0.35);
      transform: scale(1.03);
    }

    .result {
      font-size: 16px;
      line-height: 1.6;
    }

    .mbti {
      font-size: 26px;
      font-weight: bold;
      margin: 10px 0;
      font-family: "GmarketSans";
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📚 조별과제 MBTI 테스트</h1>
    <div id="app"></div>
  </div>

<script>
const questions = [
  {
    q: "조별과제 시작! 너는?",
    a: ["친구들 모아서 바로 시작함", "조용히 상황 파악부터"]
  },
  {
    q: "자료 조사할 때?",
    a: ["빠르게 여러 개 찾기", "깊게 하나 파기"]
  },
  {
    q: "발표 준비는?",
    a: ["아이디어 중심", "논리 정리 중심"]
  },
  {
    q: "마감 직전 행동은?",
    a: ["끝까지 수정함", "이미 끝냈으니 쉼"]
  }
];

let step = 0;
let score = [0,0,0,0];

function render() {
  const app = document.getElementById("app");

  if (step < questions.length) {
    const q = questions[step];

    app.innerHTML = `
      <div class="question">${q.q}</div>
      <button onclick="answer(0)">${q.a[0]}</button>
      <button onclick="answer(1)">${q.a[1]}</button>
    `;
  } else {
    showResult();
  }
}

function answer(choice) {
  score[step] = choice;
  step++;
  render();
}

function getMBTI() {
  return [
    score[0] === 0 ? "E" : "I",
    score[1] === 0 ? "N" : "S",
    score[2] === 0 ? "F" : "T",
    score[3] === 0 ? "P" : "J"
  ].join("");
}

const resultData = {
  "INTJ": ["전략가형 학생", "기획 + 전체 설계 담당", "ENTP, ENFP"],
  "INTP": ["분석형 학생", "자료 조사 + 아이디어", "ENTJ, ENFJ"],
  "ENTJ": ["리더형 학생", "팀장 + 발표 총괄", "INTP, INFP"],
  "ENTP": ["아이디어 폭발형", "기획 + 창의 담당", "INTJ, INFJ"],

  "INFJ": ["조용한 기획자", "스토리 구성", "ENFP, ENTP"],
  "INFP": ["감성형 학생", "디자인 + 스토리", "ENFJ, ENTJ"],
  "ENFJ": ["분위기 메이커", "발표 + 조율", "INFP, ISFP"],
  "ENFP": ["열정형 학생", "아이디어 + 발표", "INFJ, INTJ"],

  "ISTJ": ["책임감 MAX", "자료 정리 + 문서", "ESFP, ESTP"],
  "ISFJ": ["서포트 장인", "정리 + 보조", "ESFP, ESTP"],
  "ESTJ": ["관리형 리더", "진행 + 일정관리", "ISTP, ISFP"],
  "ESFJ": ["협력형 학생", "분위기 + 팀워크", "ISFP, ISTP"],

  "ISTP": ["실행력 갑", "실습 + 제작", "ESTJ, ESFJ"],
  "ISFP": ["감각적 학생", "디자인 담당", "ESFJ, ESTJ"],
  "ESTP": ["행동파", "발표 + 실행", "ISFJ, ISTJ"],
  "ESFP": ["인싸형", "발표 + 분위기", "ISFJ, ISTJ"]
};

function showResult() {
  const mbti = getMBTI();
  const data = resultData[mbti];

  document.getElementById("app").innerHTML = `
    <div class="mbti">${mbti}</div>
    <div class="result">
      📌 너는 <b>${data[0]}</b><br><br>
      🎯 추천 역할: <b>${data[1]}</b><br><br>
      👥 같은 조 꿀조합: <b>${data[2].join(", ")}</b>
    </div>
  `;
}

render();
</script>
</body>
</html>
