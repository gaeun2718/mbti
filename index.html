<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>조별과제 역할 테스트</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Pretendard', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #fce7f3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 420px;
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
}

h1 { font-size: 22px; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 15px; }

.progress {
    height: 8px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6366f1, #ec4899);
    transition: 0.3s;
}

.question {
    background: #f9fafb;
    padding: 18px;
    border-radius: 15px;
    margin-bottom: 15px;
    font-size: 17px;
}

button {
    width: 100%;
    padding: 13px;
    margin: 7px 0;
    border: none;
    border-radius: 12px;
    background: #f1f5f9;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #e0e7ff;
    transform: scale(1.02);
}

.result-card {
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(135deg, #6366f1, #ec4899);
    color: white;
}

.retry {
    margin-top: 15px;
    background: white;
    color: #333;
}
</style>
</head>

<body>

<div class="container">
    <h1>📚 조별과제 역할 테스트</h1>
    <div class="subtitle">너의 팀 내 포지션은?</div>
    <div class="progress"><div class="progress-bar" id="bar"></div></div>
    <div id="quiz"></div>
</div>

<script>
const questions = [
    { q:"조 모임에서 나는?", a:[
        {text:"분위기 주도", type:"E"},
        {text:"조용히 참여", type:"I"} ]},
    { q:"과제 접근은?", a:[
        {text:"현실적인 방법", type:"S"},
        {text:"아이디어 중심", type:"N"} ]},
    { q:"갈등 상황?", a:[
        {text:"논리적으로 해결", type:"T"},
        {text:"감정 고려", type:"F"} ]},
    { q:"마감 스타일?", a:[
        {text:"미리 끝냄", type:"J"},
        {text:"마감 직전", type:"P"} ]}
];

let current = 0;
let result = "";

const roles = {
"INTJ":"🧠 전략 설계자 — 전체 구조 설계",
"INTP":"🔍 분석가 — 자료 조사",
"ENTJ":"👑 리더 — 일정 관리",
"ENTP":"💡 아이디어 담당",

"INFJ":"🌱 조정자 — 갈등 해결",
"INFP":"🎨 감성 기획자",
"ENFJ":"🤝 발표 + 팀 관리",
"ENFP":"🔥 분위기 + 아이디어",

"ISTJ":"📋 자료 정리",
"ISFJ":"🛠 서포터",
"ESTJ":"📊 총괄 관리자",
"ESFJ":"🎤 발표 담당",

"ISTP":"⚙️ 문제 해결",
"ISFP":"🎨 디자인",
"ESTP":"🚀 실행 담당",
"ESFP":"🌟 발표 + 분위기"
};

/* 👇 추가된 궁합 데이터 */
const synergy = {
"INTJ":"ENFP, ESFP → 실행력과 분위기를 보완해줌",
"INTP":"ENTJ, ESTJ → 아이디어를 현실로 만들어줌",
"ENTJ":"INFP, ISFP → 감성적 균형 맞춰줌",
"ENTP":"ISTJ, ISFJ → 아이디어를 정리해줌",

"INFJ":"ESTP, ESFP → 활력을 불어넣어줌",
"INFP":"ENTJ, ESTJ → 방향을 잡아줌",
"ENFJ":"ISTP, INTP → 논리 보완",
"ENFP":"INTJ, INFJ → 깊이 있는 방향 제공",

"ISTJ":"ENFP, ENTP → 아이디어 제공",
"ISFJ":"ESTP, ESFP → 추진력 보완",
"ESTJ":"INFP, ISFP → 인간적인 균형",
"ESFJ":"INTP, ISTP → 논리 보완",

"ISTP":"ENFJ, ESFJ → 팀워크 강화",
"ISFP":"ENTJ, ESTJ → 실행 방향 제공",
"ESTP":"INFJ, ISFJ → 안정성 보완",
"ESFP":"INTJ, ISTJ → 체계 보완"
};

function showQuestion(){
    const quiz = document.getElementById("quiz");
    const bar = document.getElementById("bar");

    bar.style.width = ((current/questions.length)*100)+"%";
    quiz.innerHTML="";

    if(current < questions.length){
        const q = document.createElement("div");
        q.className="question";
        q.innerText = questions[current].q;
        quiz.appendChild(q);

        questions[current].a.forEach(ans=>{
            const btn=document.createElement("button");
            btn.innerText=ans.text;
            btn.onclick=()=>select(ans.type);
            quiz.appendChild(btn);
        });
    } else {
        showResult();
    }
}

function select(t){
    result += t;
    current++;
    showQuestion();
}

function showResult(){
    const quiz=document.getElementById("quiz");
    document.getElementById("bar").style.width="100%";

    quiz.innerHTML = `
        <div class="result-card">
            <h2>${result}</h2>
            <p>${roles[result]}</p>
            <hr style="opacity:0.3; margin:15px 0;">
            <p>🤝 잘 맞는 팀원</p>
            <p>${synergy[result]}</p>
            <button class="retry" onclick="location.reload()">다시하기</button>
        </div>
    `;
}

showQuestion();
</script>

</body>
</html>
